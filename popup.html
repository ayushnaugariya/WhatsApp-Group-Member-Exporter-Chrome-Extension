<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ContactVault</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      width: 320px;
      background: #f0f2f5;
      color: #111b21;
    }

    .header {
      background: linear-gradient(135deg, #25d366, #128c7e);
      color: white;
      padding: 16px 18px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .header svg { flex-shrink: 0; }

    .header-text h1 { font-size: 15px; font-weight: 700; }
    .header-text p  { font-size: 11px; opacity: 0.85; margin-top: 2px; }

    .body { padding: 16px; }

    .status-card {
      background: white;
      border-radius: 10px;
      padding: 14px;
      margin-bottom: 12px;
      box-shadow: 0 1px 4px rgba(0,0,0,.08);
    }

    .status-label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .5px;
      color: #667781;
      margin-bottom: 6px;
    }

    .status-value {
      font-size: 13px;
      font-weight: 500;
      color: #111b21;
    }

    .status-value.ok    { color: #25d366; }
    .status-value.warn  { color: #f0a500; }
    .status-value.error { color: #ea0038; }

    .progress-wrap {
      margin-top: 10px;
      display: none;
    }

    .progress-bar-bg {
      height: 6px;
      background: #e9edef;
      border-radius: 3px;
      overflow: hidden;
    }

    .progress-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, #25d366, #128c7e);
      border-radius: 3px;
      transition: width .3s;
      width: 0%;
    }

    .progress-text {
      font-size: 11px;
      color: #667781;
      margin-top: 4px;
      text-align: right;
    }

    .counter-row {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
    }

    .counter-box {
      flex: 1;
      background: white;
      border-radius: 10px;
      padding: 10px;
      text-align: center;
      box-shadow: 0 1px 4px rgba(0,0,0,.08);
    }

    .counter-num {
      font-size: 22px;
      font-weight: 700;
      color: #25d366;
    }

    .counter-lbl {
      font-size: 10px;
      color: #667781;
      margin-top: 2px;
    }

    .btn {
      width: 100%;
      padding: 11px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all .2s;
      margin-bottom: 8px;
    }

    .btn-primary {
      background: linear-gradient(135deg, #25d366, #128c7e);
      color: white;
    }

    .btn-primary:hover:not(:disabled) { opacity: .9; transform: translateY(-1px); }

    .btn-export {
      background: #1e7e34;
      color: white;
      display: none;
    }

    .btn-export:hover { background: #176329; }

    .btn-export-vcf {
      background: #007bff;
      color: white;
      display: none;
    }

    .btn-export-vcf:hover { background: #0069d9; }

    .btn:disabled {
      opacity: .5;
      cursor: not-allowed;
      transform: none;
    }

    .log-box {
      background: white;
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 11px;
      color: #667781;
      max-height: 90px;
      overflow-y: auto;
      box-shadow: 0 1px 4px rgba(0,0,0,.08);
      display: none;
      line-height: 1.6;
    }

    .log-box .log-line { border-bottom: 1px solid #f0f2f5; padding: 2px 0; }
    .log-box .log-line:last-child { border: none; }

    .tip {
      font-size: 11px;
      color: #667781;
      text-align: center;
      margin-top: 10px;
      line-height: 1.5;
    }
  </style>
</head>
<body>

<div class="header">
  <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
    <circle cx="14" cy="14" r="14" fill="white" fill-opacity=".2"/>
    <path d="M14 5.5C9.31 5.5 5.5 9.31 5.5 14c0 1.69.48 3.27 1.31 4.62L5.5 22.5l4.01-1.28A8.46 8.46 0 0014 22.5c4.69 0 8.5-3.81 8.5-8.5S18.69 5.5 14 5.5zm4.15 11.6c-.17.49-1 .94-1.37.99-.35.05-.79.07-1.28-.08-.3-.09-.68-.22-1.17-.43-2.05-.89-3.39-2.95-3.49-3.08-.1-.14-.8-1.07-.8-2.03 0-.97.5-1.44.68-1.64.17-.19.38-.24.5-.24l.36.01c.12 0 .28-.05.43.33l.62 1.52c.06.14.03.3-.05.43l-.23.3-.22.24c-.07.08-.15.17-.06.33.45.76.96 1.32 1.51 1.7.14.1.3.08.41-.04l.5-.58c.11-.13.27-.16.4-.11l1.48.7c.17.08.25.28.18.55z" fill="white"/>
  </svg>
  <div class="header-text">
    <h1>ContactVault</h1>
    <p>Export WhatsApp group contacts instantly</p>
  </div>
</div>

<div class="body">

  <div class="status-card">
    <div class="status-label">Current Status</div>
    <div class="status-value" id="statusText">Checking WhatsApp Web…</div>
    <div class="progress-wrap" id="progressWrap">
      <div class="progress-bar-bg">
        <div class="progress-bar-fill" id="progressFill"></div>
      </div>
      <div class="progress-text" id="progressText">0 / 0</div>
    </div>
  </div>

  <div class="counter-row">
    <div class="counter-box">
      <div class="counter-num" id="totalCount">0</div>
      <div class="counter-lbl">Total Found</div>
    </div>
    <div class="counter-box">
      <div class="counter-num" id="withNumCount">0</div>
      <div class="counter-lbl">With Number</div>
    </div>
    <div class="counter-box">
      <div class="counter-num" id="nameOnlyCount">0</div>
      <div class="counter-lbl">Name Only</div>
    </div>
  </div>

  <button class="btn btn-primary" id="btnScan">🔍 Scan Group Members</button>
  <button class="btn btn-export" id="btnExport">📥 Export to CSV (Excel)</button>
  <button class="btn btn-export-vcf" id="btnExportVCF">📥 Export to Contacts (VCF)</button>

  <div class="log-box" id="logBox"></div>

  <p class="tip" id="tipText">Open a WhatsApp group, then click Scan.</p>

</div>

<script src="popup.js"></script>
</body>
</html>
